<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Base Core Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #fff; padding: 40px; text-align: center; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: left; }
        h2, h3 { text-align: center; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; width: 100%; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        .btn-sbt { background: #8b5cf6; }
        .btn-sbt:hover { background: #7c3aed; }
        input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #475569; background: #334155; color: white; box-sizing: border-box; }
        .status { margin-top: 15px; color: #38bdf8; font-weight: bold; text-align: center; font-size: 14px; word-break: break-all; }
        .info-box { background: #334155; padding: 15px; border-radius: 8px; margin-top: 15px; display: flex; justify-content: space-around; }
        .info-item { text-align: center; }
        .badge { background: #10b981; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-none { background: #ef4444; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="card">
    <h2>Ultimate Base Core</h2>
    <p style="text-align: center; color: #94a3b8;">Token, Stake & SBT Center</p>
    <button id="connectBtn">Connect Wallet</button>
    <p id="walletAddress" class="status"></p>

    <div class="info-box">
        <div class="info-item">
            <span>Staked Balance:</span>
            <h3 id="stakedBalance" style="margin: 5px 0; color: #38bdf8;">0.000000</h3>
        </div>
        <div class="info-item">
            <span>SBT Status:</span>
            <div style="margin-top: 8px;"><span id="sbtStatus" class="badge badge-none">No SBT</span></div>
        </div>
    </div>

    <hr style="border-color: #334155; margin: 20px 0;">

    <!-- عملیات استیک / دپوزیت توکن -->
    <h3>Stake Tokens</h3>
    <label>Amount of Tokens to Stake (Wei/Units):</label>
    <input type="text" id="stakeAmount" placeholder="e.g., 1000000000000000000" />
    <button id="stakeBtn">Deposit / Stake</button>

    <hr style="border-color: #334155; margin: 20px 0;">

    <!-- عملیات مینت پاسپورت دیجیتال هویت روحی -->
    <h3>Identity & Badges</h3>
    <p style="font-size: 13px; color: #94a3b8; text-align: center;">Claim your permanent Soulbound Token credential on Base Network.</p>
    <button id="mintSbtBtn" class="btn-sbt">Mint Soulbound Passport (SBT)</button>

    <p id="txStatus" class="status"></p>
</div>

<!-- اتصال منطق جاوااسکریپت -->
<script src="app.js"></script>

</body>
</html>
